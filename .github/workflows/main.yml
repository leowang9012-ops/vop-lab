name: 定时数据抓取与报告生成

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: cd vop-lab && npm ci && npm run build
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}

      - name: Commit and push updated data
        run: |
          cd vop-lab
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "ci: auto-update $(date -u)"
          git push origin master
