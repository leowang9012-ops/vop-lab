name: 定时数据抓取与报告生成

on:
  schedule:
    # 每天 02:00 UTC = 上午 10:00 北京时间
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 支持 GitHub 页面手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vop-lab/package-lock.json

      - run: cd vop-lab && npm ci && npm run build
        env:
          # 可选：在 GitHub Settings > Secrets 添加 MIMO_API_KEY 以启用 AI 报告
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}

      - name: Commit and push updated data
        run: |
          cd vop-lab
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "ci: auto-update $(date -u)"
          git push origin master     
